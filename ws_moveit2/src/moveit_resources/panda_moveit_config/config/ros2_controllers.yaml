# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    panda_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Jazzy and newer: parallel_gripper_action_controller replaces gripper_controllers package
    panda_hand_controller:
      type: parallel_gripper_action_controller/GripperActionController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


panda_arm_controller:
  ros__parameters:
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    allow_nonzero_velocity_at_trajectory_end: true

panda_hand_controller:
  ros__parameters:
    joint: panda_finger_joint1

    # parallel_gripper_action_controller drives panda_finger_joint1 via its
    # position command interface; panda_hand.ros2_control.xacro does not expose
    # effort or velocity command interfaces on the finger joint, so we leave
    # max_effort_interface / max_velocity_interface unset. The controller falls
    # back to pure position control, which is what panda's mock_components
    # hardware supports.

    # Optional (recommended)
    state_interfaces: ["position", "velocity"]
    allow_stalling: true
    stall_timeout: 0.05
    goal_tolerance: 0.02
